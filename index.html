<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>SEVERLING</title>
  <style>
    /* Indestructible Core Layout Defaults */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #0a0a0a;
      color: #ffffff;
      font-family: Arial, sans-serif;
      padding: 60px 40px;
      -webkit-font-smoothing: antialiased;
    }
    .container {
      width: 100%;
      max-width: 1400px; 
      margin: 0 auto;
      display: flex; 
    }
    
    /* LEFT SIDEBAR NAVIGATION BLOCK */
    .left {
      width: 350px;
      min-width: 350px; 
      padding-right: 50px;
    }
    
    /* SYSTEM LOGO TYPOGRAPHY STYLE */
    .logo-container {
      margin-bottom: 15px;
    }
    h1.logo-scramble {
      font-weight: 300;
      font-size: 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      display: inline-block;
      white-space: nowrap;
    }
    
    .left-desc {
      color: #888888;
      font-size: 13px;
      line-height: 1.6;
    }

    /* ABOUT ROUTER NAVIGATION LINK */
    .about-link-row {
      margin-top: 40px;
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 0.5px;
    }
    .about-link-row a {
      color: #ffffff;
      text-decoration: none;
      transition: opacity 0.1s ease;
    }
    .about-link-row a:hover {
      opacity: 0.7;
    }

    /* ENHANCED SOCIAL MATRIX CONTRAST */
    .social-links-row {
      margin-top: 45px; 
      font-family: monospace;
      font-size: 11px;
      color: #888888;
      letter-spacing: 0.5px;
      display: block;
      width: 100%;
    }
    .social-links-row a {
      color: #888888;
      text-decoration: none;
      transition: color 0.1s ease;
    }
    .social-links-row a:hover {
      color: #ffffff;
    }
    
    /* MECHANICAL INDEX ARCHIVE BUTTON */
    .menu-btn {
      color: #ffffff;
      border-top: 1px solid #1a1a1a;
      border-bottom: 1px solid #1a1a1a;
      padding: 15px 0;
      margin-top: 12px; 
      font-size: 11px;
      font-family: monospace;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
    }
    .archive-drawer {
      display: none;
      padding: 20px 0;
    }
    .archive-drawer.is-open {
      display: block;
    }
    .archive-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .archive-list a {
      color: #666666;
      font-family: monospace;
      font-size: 12px;
      text-decoration: none;
    }
    .archive-list a:hover {
      color: #ffffff;
    }

    /* RIGHT PRIMARY CHRONO VIEW PORT */
    .right {
      flex: 1;
      padding-left: 40px;
      border-left: 1px solid #1a1a1a;
      min-width: 0; 
    }
    .feed-header {
      font-size: 11px; 
      font-family: monospace;
      color: #555555; 
      border-bottom: 1px solid #1a1a1a; 
      padding-bottom: 20px; 
      margin-bottom: 40px;
      letter-spacing: 1px;
    }
    .post-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    
    .post-title {
      font-weight: 300;         
      font-size: 20px;          
      letter-spacing: 1.5px;    
      text-transform: uppercase;
      cursor: pointer;
    }
    
    .post-date {
      font-family: monospace;
      font-size: 13px;
      color: #555555;
    }
    .content-text {
      color: #a0a0a0;
      font-size: 15px;
      line-height: 1.75;
      font-weight: 300;
      margin-bottom: 40px;
    }
    .content-text a {
      color: #ffffff;
      text-decoration: none;
      border-bottom: 1px dotted #555555;
      transition: border-color 0.1s ease;
    }
    .content-text a:hover {
      border-bottom-color: #ffffff;
    }
    
    /* LOCKED SLIM PLAYER CONTAINER */
    .media-container {
      max-width: 700px;
      width: 100%;
      background: #111111;
      border: 1px solid #1a1a1a;
      overflow: hidden;
      line-height: 0; 
    }
    .media-container iframe {
      width: 100%;
      height: 120px; 
      border: 0;
    }

    /* INTEGRATED PROFILE IMAGE FRAMING (STANDBY HIDDEN STATE) */
    .about-image-container {
      display: block; 
      max-width: 400px;
      width: 100%;
      border: 1px solid #1a1a1a;
      background: #111111;
      margin-bottom: 30px;
      line-height: 0;
    }
